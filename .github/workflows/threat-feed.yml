name: ARIA Daily Threat Feed + Diff

on:
  schedule:
    - cron: '0 6 * * *'   # Daily UTC 06:00 (JST 15:00)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Save today's snapshot
        run: python3 scripts/snapshot.py

      - name: Generate diff alerts (Layer 2)
        run: python3 scripts/diff_alerts.py

      - name: Fetch external news (Layer 1)
        run: python3 scripts/news_fetcher.py

      - name: Commit and push if changed
        run: |
          git config user.name "ARIA Bot"
          git config user.email "aria-bot@users.noreply.github.com"
          git add diff_data.js news_data.js snapshots/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: daily feed + diff $(date -u +%Y-%m-%d)"
            git push
          fi

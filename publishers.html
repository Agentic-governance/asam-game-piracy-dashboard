.pub-head{display:flex;align-items:center;gap:16px;padding-bottom:16px;border-bottom:1px solid var(--border);margin-bottom:20px}

.ps{text-align:center}.ps .v{font-size:22px;font-weight:800;font-family:'JetBrains Mono',monospace}

.ps.red .v{color:var(--red)}.ps.blue .v{color:var(--blue)}.ps.purple .v{color:var(--purple)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.card{background:var(--bg-2);border:1px solid var(--border);border-radius:12px;padding:20px}
.card h4{font-size:11px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px}
.bar-list{list-style:none}.bar-item{display:flex;align-items:center;gap:8px;margin-bottom:5px;font-size:12px}
.bar-label{width:100px;text-align:right;color:var(--text-2);flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-track{flex:1;height:18px;background:rgba(59,130,246,0.04);border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;display:flex;align-items:center;padding-left:6px;font-size:10px;font-weight:600;color:#fff;min-width:20px}
.tbl{width:100%;border-collapse:collapse;font-size:11px}
.tbl th{text-align:left;padding:8px 10px;font-weight:700;color:var(--text-3);font-size:10px;letter-spacing:0.5px;text-transform:uppercase;border-bottom:1px solid var(--border)}
.tbl td{padding:7px 10px;border-bottom:1px solid rgba(30,41,59,0.3);color:var(--text-2)}
.tbl tr:hover td{background:rgba(59,130,246,0.03)}
.tbl .n{font-variant-numeric:tabular-nums;font-weight:600;color:var(--text-1);font-family:'JetBrains Mono',monospace}
.analysis-box{background:rgba(59,130,246,0.04);border:1px solid rgba(59,130,246,0.1);border-radius:10px;padding:14px 18px;margin-top:14px;font-size:12px;color:var(--text-2);line-height:1.7}
.analysis-box strong{color:var(--text-1)}
.sev-bar{display:flex;border-radius:6px;overflow:hidden;height:22px}
.sev-bar div{display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff}
.tag{display:inline-block;padding:1px 6px;border-radius:3px;font-size:9px;font-weight:600}
.footer{text-align:center;padding:40px 56px;border-top:1px solid var(--border);color:var(--text-3);font-size:11px;margin-top:40px}

  (ctab.domain_cross||[]).slice(0,10).forEach(d=>{
    const infTags=Object.entries(d.infringement||{}).slice(0,3).map(([k,v])=>`<span class="tag" style="background:rgba(239,68,68,0.1);color:var(--red)">${k}: ${v}</span>`).join(' ');
    const langs=(d.languages||'en').split('; ').slice(0,3).map(l=>`<span class="tag" style="background:rgba(34,197,94,0.1);color:var(--green)">${l}</span>`).join(' ');
    const monCount=d.mon_count||0;
    const tierColor=d.revenue_tier==='high'?'var(--red)':d.revenue_tier==='medium-high'?'var(--amber)':'var(--text-3)';
    domTableHtml+=`<tr><td style="font-weight:500;color:var(--text-1);font-size:11px">${d.domain}</td><td class="n">${d.title_count}</td><td>${infTags||'—'}</td><td>${langs}</td><td><span style="color:${tierColor};font-weight:600;font-size:11px">${monCount} methods</span></td></tr>`;
  });
  domTableHtml+='</tbody></table>';

  section.innerHTML=`
    <div class="pub-head">
      <div class="pub-rank ${rankClass}">${idx+1}</div>
      <h2>${pubName}</h2>
      <div class="pub-stats">
        <div class="ps red"><div class="v">${detail.total.toLocaleString()}</div><div class="l">Work Entries</div></div>
        <div class="ps blue"><div class="v">${detail.sites.toLocaleString()}</div><div class="l">Sites</div></div>
        <div class="ps purple"><div class="v">${detail.unknown_pct}%</div><div class="l">Unclassified</div></div>
      </div>
    </div>
    <div class="g3">
      <div class="card"><h4>Infringement Types</h4>${infHtml}</div>
      <div class="card"><h4>Platform Distribution</h4>${platHtml}</div>
      <div class="card"><h4>Severity Distribution</h4>${sevHtml}
        <div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:8px">${[0,1,2,3,4,5].map(i=>`<span style="font-size:9px;color:var(--text-3);display:flex;align-items:center;gap:3px"><span style="width:8px;height:8px;border-radius:2px;background:${sevC[i]}"></span>S${i}: ${sev[i]||0}</span>`).join('')}</div>
      </div>
    </div>
    <div class="g2" style="margin-top:16px">
      <div class="card"><h4>Top Pirated Titles (by site spread)</h4>${titleTableHtml}</div>
      <div class="card"><h4>Top Domains (by content volume)</h4>${domTableHtml}</div>
    </div>
    <div class="analysis-box">${PUB_ANALYSIS[pubName]||''}</div>
  `;
  container.appendChild(section);
});

</script></body></html>
